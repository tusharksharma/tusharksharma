    <noscript><h1>Outlaw BBQ Grilled Thighs + Smashed Potatoes — The Split Plate</h1><p>~47g protein for ~540 calories. Boneless skinless thighs marinated in Dan-O's Outlaw Sweet &amp; Tangy + chili crisp + light oil, grilled over medium-high until the edges char (not burn), then sliced for adults and diced for kids. Smashed potatoes from a Little Potato Co. tray — microwave 5 min, smash with jagged edges (NOT puréed), bake until deeply browned. Chili crisp sour cream sauce on the side for adults; plain Daisy Light for kids. Outdoor grill is ideal; cast iron grill pan or oven broiler with grill marks works.</p></noscript>
