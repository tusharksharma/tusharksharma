    <noscript><h1>Split Plate TKS Sweet Heat Chicken Bowl — The Split Plate</h1><p>Modular dinner that stacks three cookbook bases: Bone Broth Rice (made ahead Sunday, used cold for adult fried rice + warm for kid plain rice), Spicy Umami Fried Rice (adult side), and TKS Sauce (adult chicken glaze). 1 lb Crazy Cuizine chicken in the air fryer → split at the toss step: adult portion (5 oz each) goes into a hot dry pan with TKS Sauce for the cling; kid portion (3 oz each) gets pulled before saucing, plated plain. 20 minutes active time when rice is pre-made.</p></noscript>
